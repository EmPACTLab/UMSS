<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accuracy Sampled — VQAv2 · A-OKVQA · Seed Bench</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<script>
  (function () {
    const themes = [
      { accent: "#1f3a5f", soft: "#3a5e90", rgb: "31, 58, 95", blob: "#8ea5c5" },
      { accent: "#82073c", soft: "#a11258", rgb: "130, 7, 60", blob: "#bb6a8d" },
      { accent: "#1f6b46", soft: "#309965", rgb: "31, 107, 70", blob: "#84c5a3" },
      { accent: "#5c4033", soft: "#8a624d", rgb: "92, 64, 51", blob: "#c6ab99" },
      { accent: "#b34700", soft: "#d4651a", rgb: "179, 71, 0", blob: "#d79a72" },
      { accent: "#4b2e83", soft: "#7050ad", rgb: "75, 46, 131", blob: "#ae9bcc" },
    ];
    let selected = null;
    try {
      selected = JSON.parse(localStorage.getItem("llmindAccentTheme") || "null");
    } catch (err) {}
    if (!selected) {
      selected = themes[Math.floor(Math.random() * themes.length)];
      try { localStorage.setItem("llmindAccentTheme", JSON.stringify(selected)); } catch (err) {}
    }
    const root = document.documentElement;
    root.style.setProperty("--accent", selected.accent);
    root.style.setProperty("--accent-soft", selected.soft);
    root.style.setProperty("--accent-rgb", selected.rgb);
  })();
</script>
<style>
  :root {
    --bg: #f5f8fe;
    --surface: rgba(255, 255, 255, 0.9);
    --border: rgba(20, 35, 64, 0.12);
    --text: #172742;
    --muted: #607090;
    --accent: #82073c;
    --accent-soft: #a11258;
    --accent-rgb: 130, 7, 60;

    --c1: #3a7ec8;
    --c2: #2e9e5e;
    --c3: #d4621a;
    --c4: #a83d91;
    --c5: #b06a00;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background:
      radial-gradient(920px 340px at -8% -12%, rgba(var(--accent-rgb), 0.14), transparent 64%),
      radial-gradient(860px 340px at 108% -10%, rgba(217, 131, 78, 0.14), transparent 62%),
      linear-gradient(166deg, #f8fbff 0%, var(--bg) 100%);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    padding: 34px 16px 40px;
    min-height: 100vh;
  }

  header {
    text-align: center;
    margin-bottom: 20px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    letter-spacing: 0.06em;
    color: var(--accent);
    line-height: 1;
  }

  header p {
    margin-top: 6px;
    color: var(--muted);
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 22px;
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    color: #4f607f;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 9px;
    background: rgba(255, 255, 255, 0.7);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dataset-section {
    margin-bottom: 24px;
  }

  .dataset-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: #2a3f63;
    text-transform: uppercase;
    border-left: 3px solid var(--accent);
    padding-left: 10px;
    margin-bottom: 12px;
    margin-top: 4px;
  }

  .charts-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 10px 10px;
    box-shadow: 0 8px 18px rgba(16, 32, 58, 0.09);
    backdrop-filter: blur(6px);
  }

  .chart-title {
    font-size: 0.62rem;
    font-family: 'DM Mono', monospace;
    color: #607090;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .chart-model {
    font-size: 0.84rem;
    font-weight: 700;
    color: #1f355b;
    margin-bottom: 1px;
  }

  .chart-fullres {
    font-size: 0.62rem;
    color: #6a7b99;
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
  }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .col-headers {
    display: grid;
    grid-template-columns: 108px repeat(3, 1fr);
    margin-bottom: 4px;
  }

  .col-header {
    font-size: 0.57rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.03em;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 108px repeat(3, 1fr);
    align-items: center;
    gap: 4px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }

  .bar-row:last-child { border-bottom: none; }
  .bar-row.ours .method-name { color: var(--accent); font-weight: 700; }

  .method-name {
    font-size: 0.57rem;
    font-family: 'DM Mono', monospace;
    color: #5d6f90;
    padding-right: 6px;
    line-height: 1.15;
  }

  .bar-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 2px 0;
  }

  .bar-fill {
    height: 9px;
    border-radius: 99px;
    min-width: 2px;
    width: 100%;
  }

  .bar-value {
    font-size: 0.52rem;
    font-family: 'DM Mono', monospace;
    color: #677897;
    white-space: nowrap;
    text-align: center;
    line-height: 1;
  }

  .bar-row.ours .bar-value { color: var(--accent); }

  @media (max-width: 1120px) {
    .charts-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  @media (max-width: 760px) {
    .charts-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Accuracy Sampled (%)</h1>
  <p>VQAv2 · A-OKVQA · Seed Bench &nbsp;|&nbsp; Sampling at 1%, 3%, 5%</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--c1)"></div>Uniform Sampling</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c2)"></div>Static Foveated</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c3)"></div>Sunflower Inspired</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c4)"></div>Radial Sampling</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c5)"></div>LLMind (Ours)</div>
</div>

<div id="root"></div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────
// Structure: datasets[dataset][model] = { fullRes, methods: [[1%,3%,5%], ...] }
// Methods order: Uniform, StaticFoveated, Sunflower, Radial, LLMind

const data = {
  "VQAv2": {
    "Qwen2.5-VL": {
      fullRes: 86.96,
      methods: [
        [47.31, 52.71, 59.94],
        [46.18, 51.96, 58.30],
        [43.77, 47.41, 52.85],
        [44.79, 46.25, 50.12],
        [55.05, 65.37, 73.54],
      ]
    },
    "SmolVLM": {
      fullRes: 80.01,
      methods: [
        [46.38, 53.28, 59.06],
        [44.24, 51.64, 58.43],
        [46.45, 50.55, 55.48],
        [42.99, 47.07, 50.92],
        [58.88, 70.40, 76.46],
      ]
    },
    "LLaVA-OneVision": {
      fullRes: 73.34,
      methods: [
        [40.98, 49.15, 57.60],
        [42.27, 42.88, 45.37],
        [42.29, 46.02, 50.51],
        [40.10, 42.40, 45.25],
        [47.00, 54.49, 62.38],
      ]
    },
  },
  "A-OKVQA": {
    "Qwen2.5-VL": {
      fullRes: 85.67,
      methods: [
        [44.31, 48.77, 52.01],
        [45.58, 50.65, 56.78],
        [43.23, 46.28, 51.61],
        [45.58, 47.16, 48.90],
        [51.18, 61.53, 69.74],
      ]
    },
    "SmolVLM": {
      fullRes: 78.60,
      methods: [
        [39.78, 45.06, 48.73],
        [42.09, 46.98, 51.44],
        [42.44, 46.28, 48.64],
        [41.48, 43.58, 47.33],
        [64.81, 72.63, 76.81],
      ]
    },
    "LLaVA-OneVision": {
      fullRes: 60.26,
      methods: [
        [34.80, 35.71, 42.33],
        [33.25, 35.28, 37.27],
        [27.68, 30.91, 36.24],
        [28.29, 28.03, 29.78],
        [43.01, 46.09, 53.18],
      ]
    },
  },
  "Seed Bench": {
    "Qwen2.5-VL": {
      fullRes: 71.25,
      methods: [
        [35.53, 41.55, 48.45],
        [34.75, 42.05, 49.4],
        [36.70, 40.55, 44.6],
        [35.20, 39.45, 41.75],
        [40.28, 50.50, 58.23],
      ]
    },
    "SmolVLM": {
      fullRes: 51.6,
      methods: [
        [21.81, 26.38, 29.19],
        [30.20, 36.85, 42.65],
        [33.60, 34.95, 37.85],
        [30.80, 33.15, 36.05],
        [37.42, 43.44, 45.97],
      ]
    },
    "LLaVA-OneVision": {
      fullRes: 37.75,
      methods: [
        [18.63, 21.60, 24.35],
        [24.85, 23.55, 25.60],
        [21.40, 23.90, 25.15],
        [22.90, 21.70, 22.55],
        [26.05, 27.85, 30.40],
      ]
    },
  }
};

const methodNames = [
  "Uniform Sampling",
  "Static Foveated",
  "Sunflower Inspired",
  "Radial Sampling",
  "LLMind (Ours)",
];

const colors = ["var(--c1)", "var(--c2)", "var(--c3)", "var(--c4)", "var(--c5)"];

// ── RENDER ──────────────────────────────────────────────────────────────────
function buildChart(dataset, model, info) {
  // find global max for this chart for scaling
  const maxVal = 100;

  let rowsHTML = info.methods.map((vals, mi) => {
    const isOurs = mi === 4;
    const cells = vals.map(v => {
      const pct = (v / maxVal * 100).toFixed(1);
      return `
        <div class="bar-cell">
          <div style="width:100%;background:var(--border);border-radius:3px;height:12px;overflow:hidden;">
            <div class="bar-fill" style="width:${pct}%;background:${colors[mi]}"></div>
          </div>
          <div class="bar-value">${v.toFixed(2)}</div>
        </div>`;
    }).join('');
    return `
      <div class="bar-row${isOurs ? ' ours' : ''}">
        <div class="method-name">${methodNames[mi]}</div>
        ${cells}
      </div>`;
  }).join('');

  return `
    <div class="chart-card">
      <div class="chart-title">${dataset}</div>
      <div class="chart-model">${model}</div>
      <div class="chart-fullres">Full Res Accuracy: ${info.fullRes}%</div>
      <div class="bar-chart">
        <div class="col-headers">
          <div></div>
          <div class="col-header">1%</div>
          <div class="col-header">3%</div>
          <div class="col-header">5%</div>
        </div>
        ${rowsHTML}
      </div>
    </div>`;
}

const root = document.getElementById('root');
let delay = 0;

Object.entries(data).forEach(([dataset, models]) => {
  const section = document.createElement('div');
  section.className = 'dataset-section';
  section.innerHTML = `<div class="dataset-label">${dataset}</div><div class="charts-grid" id="grid-${dataset}"></div>`;
  root.appendChild(section);

  const grid = section.querySelector('.charts-grid');
  Object.entries(models).forEach(([model, info]) => {
    const div = document.createElement('div');
    div.innerHTML = buildChart(dataset, model, info);
    const card = div.firstElementChild;
    card.style.animationDelay = `${delay}ms`;
    delay += 80;
    grid.appendChild(card);
  });
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Outcomes — Pixel Budgets</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  (function () {
    const themes = [
      { accent: "#1f3a5f", soft: "#3a5e90", rgb: "31, 58, 95", blob: "#8ea5c5" },
      { accent: "#82073c", soft: "#a11258", rgb: "130, 7, 60", blob: "#bb6a8d" },
      { accent: "#1f6b46", soft: "#309965", rgb: "31, 107, 70", blob: "#84c5a3" },
      { accent: "#5c4033", soft: "#8a624d", rgb: "92, 64, 51", blob: "#c6ab99" },
      { accent: "#b34700", soft: "#d4651a", rgb: "179, 71, 0", blob: "#d79a72" },
      { accent: "#4b2e83", soft: "#7050ad", rgb: "75, 46, 131", blob: "#ae9bcc" },
    ];
    let selected = null;
    try {
      selected = JSON.parse(localStorage.getItem("llmindAccentTheme") || "null");
    } catch (err) {}
    if (!selected) {
      selected = themes[Math.floor(Math.random() * themes.length)];
      try { localStorage.setItem("llmindAccentTheme", JSON.stringify(selected)); } catch (err) {}
    }
    const root = document.documentElement;
    root.style.setProperty("--accent", selected.accent);
    root.style.setProperty("--accent-soft", selected.soft);
    root.style.setProperty("--accent-rgb", selected.rgb);
  })();
</script>
<style>
  :root {
    --bg: #f5f8fd;
    --surface: rgba(255, 255, 255, 0.9);
    --border: rgba(20, 35, 64, 0.12);
    --text: #13213a;
    --muted: #5f6f8f;
    --correct: #6ab187;
    --wrong: #e8716a;
    --partial: #f0c355;
    --correct-dark: #2f7a57;
    --wrong-dark: #a93c35;
    --partial-dark: #986411;
    --accent: #82073c;
    --accent-soft: #a11258;
    --accent-rgb: 130, 7, 60;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background:
      radial-gradient(680px 260px at -10% -15%, rgba(var(--accent-rgb), 0.14), transparent 64%),
      radial-gradient(640px 260px at 110% -10%, rgba(217, 131, 78, 0.14), transparent 62%),
      linear-gradient(165deg, #f6f9ff 0%, var(--bg) 100%);
    font-family: 'Outfit', sans-serif;
    color: var(--text);
    padding: 30px 18px 44px;
  }

  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 8px 18px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.72);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    color: var(--muted);
    transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
  }

  .tab.active {
    background: linear-gradient(120deg, var(--accent), var(--accent-soft));
    color: #fff;
    border-color: transparent;
    box-shadow: 0 8px 16px rgba(var(--accent-rgb), 0.25);
  }

  .tab:not(.active):hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 16px rgba(18, 35, 64, 0.08);
  }

  .pair {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    align-items: stretch;
  }

  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 10px 22px rgba(16, 32, 58, 0.1);
    width: min(100%, 294px);
    backdrop-filter: blur(6px);
  }

  .chart-name {
    font-size: 0.82rem;
    font-weight: 700;
    color: #1d3359;
    margin-bottom: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .donut-container {
    position: relative;
    width: 190px;
    height: 190px;
  }

  canvas { display: block; }

  .donut-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }

  .donut-center .center-label {
    font-size: 0.6rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .donut-center .center-value {
    font-size: 1.42rem;
    font-weight: 700;
    color: var(--correct-dark);
    line-height: 1.08;
  }

  .stat-bars {
    width: 100%;
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat-label {
    font-size: 0.68rem;
    color: var(--muted);
    width: 85px;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }

  .stat-track {
    flex: 1;
    height: 8px;
    background: rgba(20, 35, 64, 0.12);
    border-radius: 99px;
    overflow: hidden;
  }

  .stat-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.23, 1, .32, 1);
  }

  .stat-val {
    font-size: 0.68rem;
    font-weight: 700;
    width: 32px;
    text-align: right;
    font-family: 'DM Mono', monospace;
  }

  .delta-strip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin: 18px auto 0;
    width: 100%;
  }

  .delta-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: nowrap;
  }

  .delta-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
    box-shadow: 0 8px 16px rgba(16, 32, 58, 0.07);
  }

  .delta-card .d-label {
    font-size: 0.62rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .delta-card .d-val {
    font-size: 1.12rem;
    font-weight: 700;
  }

  .delta-pos { color: var(--correct-dark); }
  .delta-neg { color: var(--wrong-dark); }

  @media (max-width: 680px) {
    body { padding: 24px 12px 34px; }

    .delta-row {
      width: 100%;
      flex-wrap: wrap;
    }
  }
</style>
</head>
<body>

<div class="tabs" id="tabs">
  <div class="tab active" data-idx="0">1% Budget</div>
  <div class="tab" data-idx="1">3% Budget</div>
  <div class="tab" data-idx="2">5% Budget</div>
  <div class="tab" data-idx="3">10% Budget</div>
</div>

<div class="pair" id="pair"></div>
<div class="delta-strip" id="deltaStrip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const COLORS = {
  correct: '#6ab187',
  wrong:   '#e8716a',
  partial: '#f0c355',
};

const budgets = [
  {
    title: '1% Pixel Budget',
    uniform: { correct: 15, wrong: 27, partial: 58 },
    llmind:  { correct: 24, wrong: 21, partial: 55 },
  },
  {
    title: '3% Pixel Budget',
    uniform: { correct: 19, wrong: 26, partial: 55 },
    llmind:  { correct: 34, wrong: 14, partial: 52 },
  },
  {
    title: '5% Pixel Budget',
    uniform: { correct: 21, wrong: 24, partial: 55 },
    llmind:  { correct: 41, wrong: 9,  partial: 50 },
  },
  {
    title: '10% Pixel Budget',
    uniform: { correct: 25, wrong: 22, partial: 53 },
    llmind:  { correct: 44, wrong: 9,  partial: 47 },
  },
];

let charts = [];
let activeIdx = 0;

function buildDonut(canvasId, data, centerVal) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Correct', 'Wrong', 'Partially Correct'],
      datasets: [{
        data: [data.correct, data.wrong, data.partial],
        backgroundColor: [COLORS.correct, COLORS.wrong, COLORS.partial],
        borderColor: '#ffffff',
        borderWidth: 3,
        hoverBorderWidth: 3,
        hoverOffset: 8,
      }]
    },
    options: {
      responsive: false,
      cutout: '60%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ${ctx.parsed}%`
          },
          backgroundColor: '#1a1d27',
          titleFont: { family: 'DM Mono', size: 11 },
          bodyFont: { family: 'DM Mono', size: 12 },
          padding: 10,
          cornerRadius: 8,
        }
      },
      animation: { duration: 500, easing: 'easeInOutQuart' },
    }
  });
}

function buildChart(idx) {
  // Clear old charts
  charts.forEach(c => c.destroy());
  charts = [];
  document.getElementById('pair').innerHTML = '';
  document.getElementById('deltaStrip').innerHTML = '';

  const b = budgets[idx];
  const series = [
    { name: 'Uniform Sampling', data: b.uniform },
    { name: 'LLMind (Ours)',    data: b.llmind  },
  ];

  series.forEach((s, si) => {
    const wrap = document.createElement('div');
    wrap.className = 'chart-wrap';

    const nameEl = document.createElement('div');
    nameEl.className = 'chart-name';
    nameEl.textContent = s.name;
    wrap.appendChild(nameEl);

    const container = document.createElement('div');
    container.className = 'donut-container';

    const canvas = document.createElement('canvas');
    canvas.id = `donut-${si}`;
    canvas.width = 190; canvas.height = 190;
    container.appendChild(canvas);

    const center = document.createElement('div');
    center.className = 'donut-center';
    center.innerHTML = `<div class="center-label">Correct</div><div class="center-value">${s.data.correct}%</div>`;
    container.appendChild(center);

    wrap.appendChild(container);

    // Stat bars
    const bars = document.createElement('div');
    bars.className = 'stat-bars';

    const items = [
      { label: 'Correct',    val: s.data.correct, color: COLORS.correct },
      { label: 'Wrong',      val: s.data.wrong,   color: COLORS.wrong   },
      { label: 'Partial',    val: s.data.partial, color: COLORS.partial },
    ];
    items.forEach(it => {
      const row = document.createElement('div');
      row.className = 'stat-row';
      row.innerHTML = `
        <div class="stat-label">${it.label}</div>
        <div class="stat-track"><div class="stat-fill" style="width:${it.val}%;background:${it.color}"></div></div>
        <div class="stat-val" style="color:${it.color}">${it.val}%</div>
      `;
      bars.appendChild(row);
    });
    wrap.appendChild(bars);
    document.getElementById('pair').appendChild(wrap);

    const c = buildDonut(`donut-${si}`, s.data);
    charts.push(c);
  });

  // Delta cards
  const deltaData = [
    { label: 'Correct ↑',   val: b.llmind.correct - b.uniform.correct, betterWhenHigher: true  },
    { label: 'Wrong ↓',     val: b.llmind.wrong   - b.uniform.wrong,   betterWhenHigher: false },
    { label: 'Partial',     val: b.llmind.partial - b.uniform.partial, betterWhenHigher: false },
  ];

  const strip = document.getElementById('deltaStrip');
  const intro = document.createElement('div');
  intro.style.cssText = 'width:100%;text-align:center;font-size:0.78rem;color:var(--muted);font-family:DM Mono,monospace;margin-bottom:4px;letter-spacing:0.04em;text-transform:uppercase;';
  intro.textContent = 'LLMind vs Uniform — difference';
  strip.appendChild(intro);

  const row = document.createElement('div');
  row.className = 'delta-row';
  deltaData.forEach(d => {
    const card = document.createElement('div');
    card.className = 'delta-card';
    const sign  = d.val > 0 ? '+' : '';
    const improved = d.betterWhenHigher ? d.val > 0 : d.val < 0;
    const cls = improved ? 'delta-pos' : 'delta-neg';
    card.innerHTML = `<div class="d-label">${d.label}</div><div class="d-val ${cls}">${sign}${d.val}%</div>`;
    row.appendChild(card);
  });
  strip.appendChild(row);
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeIdx = parseInt(tab.dataset.idx);
    buildChart(activeIdx);
  });
});

buildChart(0);
</script>
</body>
</html>
